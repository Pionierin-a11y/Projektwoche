<html>
  <head>
    <link rel="stylesheet" href="mystyle.css?v=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>
    <h1>Testing</h1>

    <div id="ui-container" class="hidden">
        <img id="ar-gif" src="./Heart_Button.png" alt="Interaktives GIF">
    </div>

    <div id="text-container">
        <p id="countdown"></p>
        <p id="status" display="none">Klicke hier zum Durchatmen</p>
    </div>

    <audio id="ar-sound" src="./rain_sound.mp3" preload="auto"></audio>

    <a-scene mindar-image="imageTargetSrc: targetsV1.mind;" 
             embedded color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="mytarget" mindar-image-target="targetIndex: 0"></a-entity>
        
    </a-scene>

    <script src="myscript.js?v=1.0"></script>
  </body>
</html>
