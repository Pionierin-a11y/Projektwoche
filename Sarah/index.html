<!DOCTYPE html>
<html lang="de">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>MindAR - GIF Overlay & Sound</title>
      
      <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
      
      <link rel="stylesheet" href="mystyle.css?v=1.1">
  </head>

  <body>
    <!-- Test -->
    <div id="ui-container" class="hidden">
      <img id="ar-gif" src="./Heart_Button.gif" alt="Interaktives GIF">
    </div>

    <audio id="ar-sound" src="./rain_sound.mp3" preload="auto"></audio>

    <a-scene mindar-image="imageTargetSrc: targets.mind; uiScanning: #scanning-overlay;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
        
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="mytarget" mindar-image-target="targetIndex: 0"></a-entity>
          
    </a-scene>
      <div id="scanning-overlay" class="mindar-ui-scanning">
          <div>Scanne das Target-Bild...</div>
      </div>

      <script src="myscript.js?v=1.1"></script>

  </body>
</html>
