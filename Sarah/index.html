<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
    /* Erzwingt, dass der MindAR-Sucher über der Kamera angezeigt wird */
    .mindar-ui-scanning {
      z-index: 999 !important;
      display: flex !important;
    }
    /* Falls A-Frame die UI überlagert */
    .a-canvas {
      z-index: 1;
    }
</style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: https://github.com/Pionierin-a11y/Projektwoche/blob/main/Sarah/targets.mind;" vr-mode-ui="enabled: false" id="scene">
      <a-camera look-controls="enabled: false"></a-camera>
    </a-scene>
  </body>
</html>
