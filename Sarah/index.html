<html>
  <head>
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>
    <div id="heart-container" display="inline">
      <img id="heart-image" src="./Heart_Button.png" alt="Bild eines Herzen">
      <div id="text-container">
        <p id="countdown"></p>
        <p id="status" display="none">Klicke hier zum Durchatmen</p>
      </div>
    </div>

    <audio id="rain-sound" src="./rain_sound.mp3" preload="auto"></audio>

     <a-scene mindar-image="imageTargetSrc: targetsV1.mind; uiScanning: #scanning-overlay;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mytarget" mindar-image-target="targetIndex: 0"></a-entity>

    </a-scene>

    <script src="myscript.js"></script>
  </body>
</html>
