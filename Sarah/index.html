
<html>
  <head>
    <link rel="stylesheet" href="ahhhhh.css">
    <script src="./script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
    <style>
      h1{
        color: red;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      }

        /* Container für die Positionierung auf dem Bildschirm */
      #ui-container {
        position: fixed;
        bottom: 12%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        display: none; /* Wird per JS eingeblendet */
      }

      /* Der eigentliche Herz-Button */
      .heart-button {
        position: relative;
        width: 60px;
        height: 60px;
        background-color: #ff2d55;
        border: none;
        cursor: pointer;
        transform: rotate(-45deg); /* Dreht das Quadrat, um die Herzspitze zu bilden */
        outline: none;
        animation: pulse 1.5s infinite; /* Pulsierender Effekt */
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        -webkit-tap-highlight-color: transparent;
      }

      /* Die oberen Rundungen des Herzens (Abgerundete Ohren) */
      .heart-button::before,
      .heart-button::after {
        content: "";
        position: absolute;
        width: 60px;
        height: 60px;
        background-color: #ff2d55;
        border-radius: 50%;
      }

      .heart-button::before {
        top: -30px;
        left: 0;
      }

      .heart-button::after {
        top: 0;
        left: 30px;
      }

      /* Animation, damit das Herz lebendig wirkt */
      @keyframes pulse {
        0% { transform: rotate(-45deg) scale(1); }
        50% { transform: rotate(-45deg) scale(1.1); }
        100% { transform: rotate(-45deg) scale(1); }
      }

      /* Zustand, wenn das Herz gedrückt wird */
      .heart-button:active {
        background-color: #cc0033;
        animation: none;
        transform: rotate(-45deg) scale(0.95);
      }
      .heart-button:active::before,
      .heart-button:active::after {
        background-color: #cc0033;
      }
    </style>
  
  </head>

  <body>
    <h1>Testedddd</h1>

    <!-- AR Content -->
    <a-scene mindar-image="imageTargetSrc: ./targetsV1.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
	      <img id="card" src="./Heart_Button.png" />
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
      </a-entity>
    </a-scene>

    <!-- UI Content -->
    <div id="ui-container">
      <button id="actionButton" class="heart-button">Test</button>
    </div>
  </body>
</html>
